version: 2

project_name: gowc

before:
  hooks:
    - go mod tidy

builds:
  - main: "."
    binary: gowc
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - "386"
      - amd64
      - arm64
    goarm:
      - "7"

blobs:
  - provider: s3
    region: eu-west-2
    bucket: get.followtheprocess.codes
    directory: "{{ .ProjectName }}/v{{ .Version }}"

homebrew_casks:
  - name: gowc
    binaries:
      - gowc
    url:
      template: "https://get.followtheprocess.codes/{{ .ProjectName }}/v{{ .Version }}/{{ .ArtifactName }}"
      verified: github.com/FollowTheProcess/gowc
    directory: Casks
    description: Implementation of wc in Go
    homepage: https://github.com/FollowTheProcess/gowc
    commit_author:
      name: Tom Fleet
      email: me@followtheprocess.codes
    repository:
      owner: FollowTheProcess
      name: homebrew-tap
      token: "{{.Env.HOMEBREW_TAP_TOKEN}}"
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gowc"]
          end

dockers_v2:
  - images:
      - followtheprocess/gowc
      - ghcr.io/followtheprocess/gowc
    tags:
      - "{{ .Version }}"
    labels:
      "org.opencontainers.image.description": "Implementation of wc in Go"
      "org.opencontainers.image.created": "{{.CommitDate}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"

docker_digest:
  name_template: digests.txt

archives:
  - name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

sboms:
  - artifacts: archive
    documents:
      - >-
        {{ .ProjectName }}-
        {{- .Version }}-
        {{- .Os }}-
        {{- if eq .Arch "amd64" }}x86_64
        {{- else if eq .Arch "386" }}i386
        {{- else }}{{ .Arch }}{{ end }}.sbom

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-dev{{ .ShortCommit }}"

changelog:
  # The changelog is handled by release drafter
  disable: true
